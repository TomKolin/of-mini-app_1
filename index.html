<script>
const tg = window.Telegram?.WebApp;
let userId = tg?.initDataUnsafe?.user?.id || 0;

const BACKEND_URL = "https://tomkolin.pythonanywhere.com/check_payment";
const address = "UQA4aInFqReAIe9UrFhqu-CRzhpLAGwAZJKAEYMO_KIjK0ni";

function generateAmount(userId) {
    const base = 0.1;
    const extra = (userId % 1000) / 100000;
    return (base + extra).toFixed(6);
}

document.getElementById("payBtn").addEventListener("click", () => {
    if (userId === 0) {
        alert("Open from Telegram bot");
        return;
    }

    const amount = generateAmount(userId);

    document.getElementById("paymentOptions").innerHTML = `
        <div style="margin-bottom:15px; font-size:14px; color:#aaa;">
            Send exactly:<br>
            <b style="color:#fff;">${amount} TON</b>
        </div>

        <button onclick="copyAmount('${amount}')">📋 Copy amount</button>
        <button onclick="openTelegramWallet('${amount}')">💎 Telegram Wallet</button>
        <button onclick="openExternalWallet('${amount}')">🔗 TON Keeper / Tonhub</button>
    `;

    document.getElementById("paymentOptions").style.display = "block";
});

function copyAmount(amount) {
    navigator.clipboard.writeText(amount);
    alert("Amount copied: " + amount);
}

function showStatus(msg, type = "") {
    const el = document.getElementById("status");
    el.innerHTML = msg;
    el.style.background = type === "success" ? "rgba(0,255,100,0.2)" : "rgba(255,200,0,0.2)";
    el.style.color = type === "success" ? "#00ff88" : "#ffcc00";
}

async function checkPayment(amount) {
    showStatus("Checking payment...");

    for (let i = 0; i < 15; i++) {
        try {
            const res = await fetch(BACKEND_URL, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    amount: amount,
                    user_id: userId
                })
            });

            const data = await res.json();

            if (data.paid) {
                showStatus("✅ Payment successful!", "success");
                return;
            }
        } catch(e) {}

        await new Promise(r => setTimeout(r, 4000));
    }

    showStatus("Payment not found");
}

// 🟣 Telegram Wallet (копируешь вручную)
function openTelegramWallet(amount) {
    const text = `Address: ${address}\nAmount: ${amount} TON`;
    navigator.clipboard.writeText(text);

    alert("Payment details copied. Open Telegram Wallet and paste.");

    window.open("https://t.me/wallet", "_blank");

    setTimeout(() => checkPayment(amount), 4000);
}

// 🟢 Tonkeeper / Tonhub (автоматически)
function openExternalWallet(amount) {
    const nano = Math.floor(amount * 1e9);
    const link = `ton://transfer/${address}?amount=${nano}`;

    window.open(link, "_blank");

    setTimeout(() => checkPayment(amount), 4000);
}
</script>
