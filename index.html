<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TON Pay</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    background: #0a0a0a;
    color: white;
    font-family: Arial;
    text-align: center;
    padding: 20px;
}
button {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}
.pay { background: orange; }
</style>
</head>

<body>

<h2>💰 Pay for access</h2>

<button id="payBtn" class="pay">Pay</button>

<div id="paymentOptions"></div>
<div id="status"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let userId = tg.initDataUnsafe?.user?.id;

const BACKEND = "https://tomkolin.pythonanywhere.com/check_payment";
const ADDRESS = "UQA4aInFqReAIe9UrFhqu-CRzhpLAGwAZJKAEYMO_KIjK0ni";

// уникальная сумма
function getAmount(id) {
    return (0.1 + (id % 1000) / 100000).toFixed(6);
}

document.getElementById("payBtn").onclick = () => {

    if (!userId) {
        alert("Open inside Telegram");
        return;
    }

    const amount = getAmount(userId);

    document.getElementById("paymentOptions").innerHTML = `
        <p>Send exactly:</p>
        <h3>${amount} TON</h3>

        <button onclick="copy('${amount}')">📋 Copy amount</button>
        <button onclick="tgWallet('${amount}')">💎 Telegram Wallet</button>
        <button onclick="extWallet('${amount}')">🔗 TON Keeper</button>
    `;
};

// копировать
function copy(amount) {
    navigator.clipboard.writeText(amount);
    alert("Copied: " + amount);
}

// Telegram Wallet
function tgWallet(amount) {
    const text = "Address: " + ADDRESS + "\\nAmount: " + amount;
    navigator.clipboard.writeText(text);

    window.open("https://t.me/wallet", "_blank");

    setTimeout(() => check(amount), 4000);
}

// Tonkeeper
function extWallet(amount) {
    const nano = Math.floor(amount * 1e9);
    window.open(`ton://transfer/${ADDRESS}?amount=${nano}`);

    setTimeout(() => check(amount), 4000);
}

// статус
function status(msg, ok=false) {
    const el = document.getElementById("status");
    el.innerHTML = msg;
    el.style.color = ok ? "lime" : "orange";
}

// проверка оплаты
async function check(amount) {

    status("Checking payment...");

    for (let i = 0; i < 15; i++) {

        try {
            const r = await fetch(BACKEND, {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({
                    amount: amount,
                    user_id: userId
                })
            });

            const data = await r.json();

            if (data.paid) {
                status("✅ SUCCESS! Check Telegram", true);
                return;
            }

        } catch(e) {}

        await new Promise(r => setTimeout(r, 4000));
    }

    status("❌ Payment not found");
}
</script>

</body>
</html>
